    type: serve
  runner:
    hostfile: null
    deploy:
      use_fs_serve: false
  envs:
    ASCEND_RT_VISIBLE_DEVICES: 0,1
    ASCEND_DEVICE_MAX_CONNECTIONS: '1'
action: run
hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
